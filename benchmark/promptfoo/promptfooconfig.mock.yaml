# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json
#
# MOCK config — uses two JS mock providers so the pipeline runs end-to-end
# without any real API calls (and without any cost). Use this to smoke-test
# wiring / dataset / assertions, NOT to grade model quality.
#
# Real eval: see promptfooconfig.yaml (requires OPENAI_API_KEY).

description: Resume-bullet rewriter — MOCK (no API calls, smoke test only).

prompts:
  - file://prompts/rewrite.txt

providers:
  - id: file://providers/mock-rewriter.js

tests: file://tests.js:generateTests

defaultTest:
  assert:
    - type: llm-rubric
      value: file://faithfulness-rubric.txt
      provider: file://providers/mock-judge.js
      metric: faithfulness

    - type: javascript
      value: file://assertions/theme_coverage.js
      metric: theme_coverage

    - type: llm-rubric
      value: file://style-rubric.txt
      provider: file://providers/mock-judge.js
      metric: style

    - type: javascript
      value: file://assertions/length.js
      metric: length

outputPath: results.mock.json
