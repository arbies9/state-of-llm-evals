<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>State of LLM Evals</title>
  <meta name="description" content="Methodology-first comparison of LLM eval tools: Promptfoo, Braintrust, LangSmith, Inspect, Ragas.">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <script>
    (function () {
      try {
        var mode = localStorage.getItem('state-of-llm-evals-theme') || 'auto';
        var dark = mode === 'dark' || (mode === 'auto' && matchMedia('(prefers-color-scheme: dark)').matches);
        document.documentElement.dataset.theme = dark ? 'dark' : 'light';
        document.documentElement.dataset.mode = mode;
      } catch (err) {
        document.documentElement.dataset.theme = 'light';
        document.documentElement.dataset.mode = 'auto';
      }
    })();
  </script>
  <style>
    :root {
      color-scheme: light;
      --theme-color: #ff4d4d;
      --accent: #ff4d4d;
      --accent-strong: #d91616;
      --ink: #111214;
      --muted: #5c626b;
      --line: #dedfe3;
      --bg: #f5f5f5;
      --bg-soft: #f0f1f3;
      --surface: #ffffff;
      --surface-raised: #ffffff;
      --button-bg: #ffffff;
      --sidebar-name-color: var(--ink);
    }
    html[data-theme="dark"] {
      color-scheme: dark;
      --theme-color: #ff5a5a;
      --accent: #ff5a5a;
      --accent-strong: #ff7a7a;
      --ink: #f4f5f7;
      --muted: #a8adb7;
      --line: #30343b;
      --bg: #07080a;
      --bg-soft: #15181d;
      --surface: #0f1115;
      --surface-raised: #14171c;
      --button-bg: #101318;
    }
    body {
      background: var(--bg);
      color: var(--ink);
    }
    a { color: var(--accent); }
    .sidebar > h1 { margin: 1.2rem 0 0.5rem; font-size: 1.1rem; }
    .sidebar > h1 a {
      color: var(--ink) !important;
      opacity: 1;
    }
    .sidebar,
    .search {
      background: var(--surface);
      border-color: var(--line);
    }
    .sidebar ul li a,
    .sidebar-nav,
    .app-sub-sidebar li:before {
      color: var(--muted);
    }
    .sidebar ul li.active > a,
    .sidebar ul li a:hover {
      color: var(--accent);
      border-color: var(--accent);
    }
    .content {
      background: var(--bg);
    }
    .markdown-section {
      overflow-x: auto;
      overflow-wrap: anywhere;
      color: var(--ink);
    }
    .markdown-section h1,
    .markdown-section h2,
    .markdown-section h3,
    .markdown-section h4,
    .markdown-section h1 .anchor span,
    .markdown-section h2 .anchor span,
    .markdown-section h3 .anchor span,
    .markdown-section h4 .anchor span,
    .markdown-section strong {
      color: var(--ink) !important;
    }
    .markdown-section blockquote {
      background: var(--bg-soft);
      border-left-color: var(--accent);
      color: var(--muted);
    }
    .markdown-section table {
      display: table;
      width: max-content;
      min-width: 100%;
      max-width: none;
      background: var(--surface);
    }
    .markdown-section tr {
      background: var(--surface) !important;
    }
    .markdown-section tr:nth-child(2n) {
      background: var(--bg-soft) !important;
    }
    .markdown-section th,
    .markdown-section td {
      vertical-align: top;
      border-color: var(--line);
      color: var(--ink);
    }
    .markdown-section th {
      background: var(--bg-soft);
      color: var(--ink);
    }
    .markdown-section pre {
      overflow-x: auto;
      background: var(--bg-soft);
    }
    .markdown-section code {
      background: var(--bg-soft);
      color: var(--ink);
    }
    .search input {
      background: var(--button-bg);
      border-color: var(--line);
      color: var(--ink);
    }
    .search .matching-post {
      border-color: var(--line);
    }
    .search .matching-post a {
      color: var(--ink);
    }
    .sidebar-toggle {
      background: var(--surface);
    }
    .sidebar-toggle span {
      background-color: var(--accent);
    }
    .docs-theme-mode {
      position: fixed;
      right: 1rem;
      bottom: 1rem;
      z-index: 80;
      display: inline-flex;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: .18rem;
      background: var(--surface-raised);
      box-shadow: 0 10px 30px rgba(0, 0, 0, .12);
    }
    .docs-theme-mode button {
      border: 0;
      border-radius: 999px;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      font: inherit;
      font-size: .78rem;
      line-height: 1;
      min-height: 30px;
      padding: .35rem .65rem;
    }
    .docs-theme-mode button:hover {
      color: var(--ink);
    }
    .docs-theme-mode button.active {
      background: var(--ink);
      color: var(--bg);
    }
    @media (max-width: 560px) {
      .docs-theme-mode {
        position: static;
        display: flex;
        width: min(360px, calc(100% - 5.5rem));
        margin: .75rem auto 0 .75rem;
      }
      .docs-theme-mode button {
        flex: 1 1 0;
      }
      .markdown-section pre,
      .markdown-section pre code {
        white-space: pre-wrap;
        word-break: break-word;
      }
    }
  </style>
</head>
<body>
  <div class="docs-theme-mode" role="group" aria-label="Color mode">
    <button type="button" data-mode="light">Light</button>
    <button type="button" data-mode="dark">Dark</button>
    <button type="button" data-mode="auto">Auto</button>
  </div>
  <div id="app">Loading the State of LLM Evals…</div>
  <script>
    window.$docsify = {
      name: 'State of LLM Evals',
      repo: 'arbies9/state-of-llm-evals',
      loadSidebar: true,
      auto2top: true,
      subMaxLevel: 2,
      markdown: {
        renderer: {
          code(code, lang) {
            if (lang === 'mermaid') {
              return '<div class="mermaid">' + code.replace(/&/g, '&amp;').replace(/</g, '&lt;') + '</div>';
            }
            return this.origin.code.apply(this, arguments);
          }
        }
      },
      plugins: [
        function (hook) {
          hook.doneEach(function () {
            var nodes = document.querySelectorAll('.mermaid');
            if (window.mermaid && nodes.length) {
              window.mermaid.run({ nodes: nodes });
            }
          });
        }
      ],
      alias: {
        '/benchmark/': '/benchmark/README.md',
        '/benchmark/promptfoo/': '/benchmark/promptfoo/README.md',
        '/benchmark/braintrust/': '/benchmark/braintrust/README.md',
        '/benchmark/langsmith/': '/benchmark/langsmith/README.md',
        '/benchmark/inspect/': '/benchmark/inspect/README.md',
        '/tools/': '/tools/README.md',
        '/methodology/': '/methodology/rubric.md'
      },
      search: {
        placeholder: 'Search the project…',
        noData: 'No matches.',
        depth: 4
      }
    };
  </script>
  <script src="//cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
  <script>window.mermaid && window.mermaid.initialize({ startOnLoad: false, theme: 'neutral' });</script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-python.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-yaml.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-javascript.min.js"></script>
  <script>
    (function () {
      var key = 'state-of-llm-evals-theme';
      var media = window.matchMedia('(prefers-color-scheme: dark)');

      function resolvedTheme(mode) {
        return mode === 'dark' || (mode === 'auto' && media.matches) ? 'dark' : 'light';
      }

      function setThemeMode(mode) {
        var nextMode = ['light', 'dark', 'auto'].indexOf(mode) >= 0 ? mode : 'auto';
        localStorage.setItem(key, nextMode);
        document.documentElement.dataset.mode = nextMode;
        document.documentElement.dataset.theme = resolvedTheme(nextMode);
        document.querySelectorAll('.docs-theme-mode button').forEach(function (button) {
          var active = button.dataset.mode === nextMode;
          button.classList.toggle('active', active);
          button.setAttribute('aria-pressed', String(active));
        });
      }

      document.querySelectorAll('.docs-theme-mode button').forEach(function (button) {
        button.onclick = function () { setThemeMode(button.dataset.mode); };
      });
      media.addEventListener('change', function () {
        if ((localStorage.getItem(key) || 'auto') === 'auto') setThemeMode('auto');
      });
      setThemeMode(localStorage.getItem(key) || document.documentElement.dataset.mode || 'auto');
    })();
  </script>
</body>
</html>
